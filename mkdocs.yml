    - "03 - WAF Policies": modules/03-waf-policies.md
    - "04 - Managed Rules": modules/04-managed-rules.md
    - "05 - Exclusions & Tuning": modules/05-exclusions.md
    - "06 - Custom Rules": modules/06-custom-rules.md
    - "07 - Bot Protection": modules/07-bot-protection.md
    - "08 - Application Gateway": modules/08-application-gateway.md
    - "09 - Front Door": modules/09-front-door.md
    - "10 - AGC (Containers)": modules/10-agc.md
    - "11 - DDoS Protection": modules/11-ddos.md
    - "12 - Monitoring": modules/12-monitoring.md
    - "13 - Copilot & Sentinel": modules/13-copilot-sentinel.md
    - "14 - Best Practices": modules/14-best-practices.md
  - Labs:
    - "Lab Overview": labs/index.md
    - "Infrastructure Setup": labs/setup.md
    - "Lab 01 - Deploy AppGW WAF": labs/lab01.md
    - "Lab 02 - Detection Mode": labs/lab02.md
    - "Lab 03 - KQL Analysis": labs/lab03.md
    - "Lab 03B - Triage Workbook": labs/lab03b.md
    - "Lab 04 - Exclusions": labs/lab04.md
    - "Lab 05 - Prevention Mode": labs/lab05.md
    - "Lab 06 - Front Door WAF": labs/lab06.md
    - "Lab 07 - Bot Protection": labs/lab07.md
    - "Lab 08 - Rate Limiting": labs/lab08.md
    - "Lab 09 - AGC WAF": labs/lab09.md
    - "Lab 10 - Sentinel": labs/lab10.md
